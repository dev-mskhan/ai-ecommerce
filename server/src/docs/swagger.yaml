  /auth/signup:
    $ref: ./paths/auth.yaml#/signup
  /auth/login:
    $ref: ./paths/auth.yaml#/login
  /auth/verify-email/{token}:
    $ref: ./paths/auth.yaml#/verify-email~1{token}
  /auth/logout:
    $ref: ./paths/auth.yaml#/logout
  /auth/refresh-access-token:
    $ref: ./paths/auth.yaml#/refresh-access-token
  /auth/forgot-password:
    $ref: ./paths/auth.yaml#/forgot-password
  /auth/reset-password/{token}:
    $ref: ./paths/auth.yaml#/reset-password~1{token}

  # 2. Products (Public)
  /products:
    $ref: ./paths/product.yaml#/get-products
  /products/{id}:
    $ref: ./paths/product.yaml#/get-product-by-id
  /products/slug/{slug}:
