# Public Routes
get-products:
  get:
    tags: [Products]
    summary: Get all products
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          example: 1
      - name: limit
        in: query
        schema:
          type: integer
          example: 20
      - name: q
        in: query
        schema:
          type: string
          example: "shoes"
      - name: category
        in: query
        schema:
          type: string
      - name: minPrice
        in: query
        schema:
          type: number
      - name: maxPrice
        in: query
        schema:
          type: number
    responses:
      '200':
        description: Products fetched
        content:
          application/json:
            example:
              statusCode: 200
              data:
                products: []
                total: 100
                page: 1
                totalPages: 5
              message: "Products fetched"

get-product-by-slug:
  get:
    tags: [Products]
    summary: Get product by slug
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        example: "nike-air-max-90"
    responses:
      '200':
        description: Product fetched
        content:
          application/json:
            example:
              statusCode: 200
              data:
                _id: "64abc123"
                name: "Nike Air Max 90"
                slug: "nike-air-max-90"
                price: 120
                images: []
                isActive: true
              message: "Product fetched"
      '404':
        description: Product not found
        content:
          application/json:
            example:
              statusCode: 404
              data: null
              message: "Product not found"
get-product-by-id:
  get:
    tags: [Products]
    summary: Get product by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: "64abc123def456789abc1234"
    responses:
      '200':
        description: Product fetched
        content:
          application/json:
            example:
              statusCode: 200
              data:
                _id: "64abc123"
                name: "Nike Air Max 90"
                slug: "nike-air-max-90"
                price: 120
                images: []
                isActive: true
              message: "Product fetched"
      '404':
        description: Product not found
        content:
          application/json:
            example:
              statusCode: 404
              data: null
              message: "Product not found"
# Vendor Routes
vendor-products:
  get:
    tags: [Products - Vendor]
    summary: Get vendor's own products
    security:
      - cookieAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
      - name: limit
        in: query
        schema:
          type: integer
    responses:
      '200':
        description: Products fetched
        content:
          application/json:
            example:
              statusCode: 200
              data:
                products: []
                total: 10
                page: 1
                totalPages: 1
              message: "Products fetched"
      '401':
        description: Unauthorized
        content:
          application/json:
            example:
              statusCode: 401
              data: null
              message: "Unauthorized"

create-product:
  post:
    tags: [Products - Vendor]
    summary: Create a product
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [name, price, category, images]
            properties:
              name:
                type: string
                example: "Nike Air Max 90"
              description:
                type: string
              price:
                type: number
                example: 120
              category:
                type: string
                example: "64abc123def456789abc1234"
              tags:
                type: array
                items:
                  type: string
              images:
                type: array
                items:
                  type: string
                  format: binary
    responses:
      '201':
        description: Product created
        content:
          application/json:
            example:
              statusCode: 201
              data:
                _id: "64abc123"
                name: "Nike Air Max 90"
                price: 120
              message: "Product created"
      '400':
        description: Validation failed or no images
        content:
          application/json:
            example:
              statusCode: 400
              data: null
              message: "At least one image is required"

update-product:
  patch:
    tags: [Products - Vendor]
    summary: Update a product
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: "64abc123def456789abc1234"
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              price:
                type: number
              tags:
                type: array
                items:
                  type: string
              images:
                type: array
                items:
                  type: string
                  format: binary
    responses:
      '200':
        description: Product updated
        content:
          application/json:
            example:
              statusCode: 200
              data: {}
              message: "Product updated"
      '404':
        description: Product not found
        content:
          application/json:
            example:
              statusCode: 404
              data: null
              message: "Product not found"

delete-product:
  delete:
    tags: [Products - Vendor]
    summary: Delete a product
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Product deleted
        content:
          application/json:
            example:
              statusCode: 200
              data: null
              message: "Product deleted"
      '404':
        description: Product not found

toggle-product-status:
  patch:
    tags: [Products - Vendor]
    summary: Toggle product active/inactive
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Status toggled
        content:
          application/json:
            example:
              statusCode: 200
              data: {}
              message: "Product activated"
update-stock:
  patch:
    tags: [Products - Vendor]
    summary: Update product stock
    security:
      - cookieAuth: []
    parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
    requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [stock]
              properties:
                stock:
                  type: number
    responses:
      '200':
        description: Stock updated
        content:
          application/json:
            example:
              statusCode: 200
              data: {}
              message: "Stock updated"
      '404':
        description: Product not found
        content:
          application/json:
            example:
              statusCode: 404
              data: null
              message: "Product not found"
# Admin Routes
admin-delete-product:
  delete:
    tags: [Products - Admin]
    summary: Delete any product (admin)
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Product deleted by admin
        content:
          application/json:
            example:
              statusCode: 200
              data: null
              message: "Product deleted by admin"
      '404':
        description: Product not found

toggle-featured-product:
  patch:
    tags: [Products - Admin]
    summary: Toggle product featured status (admin)
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Featured status toggled
        content:
          application/json:
            example:
              statusCode: 200
              data: {}
              message: "Product featured"
  update-stock:
    patch:
      tags: [Products - Vendor]
      summary: Update product stock
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              stock: 10
      responses:
        '200':
          description: Stock updated
          content:
            application/json:
              example:
                statusCode: 200
                data: {}
                message: "Stock updated"
        '404':
          description: Product not found
          content:
            application/json:
              example:
                statusCode: 404
                data: null
                message: "Product not found"