    "/orders/create": {
      "post": {
        "tags": [
          "Orders"
        ],
        "summary": "Place a new order",
        "security": [
          {
            "cookieAuth": []
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "items",
                  "shippingAddress",
                  "paymentMethod"
                ],
                "properties": {
                  "items": {
                    "type": "array",
                    "items": {
                      "type": "object",
                      "required": [
                        "product",
                        "quantity"
                      ],
                      "properties": {
                        "product": {
                          "type": "string",
                          "example": "664f1b2c9a8e4d001f3c7a11"
                        },
                        "quantity": {
                          "type": "integer",
                          "minimum": 1,
                          "example": 2
                        },
                        "selectedVariants": {
                          "type": "object",
                          "additionalProperties": {
                            "type": "string"
                          },
                          "example": {
                            "size": "42",
                            "color": "Black"
                          }
                        }
                      }
                    }
                  },
                  "shippingAddress": {
                    "type": "object",
                    "required": [
                      "fullName",
                      "phone",
                      "addressLine1",
                      "city",
                      "state",
                      "postalCode",
                      "country"
                    ],
                    "properties": {
                      "fullName": {
                        "type": "string",
                        "example": "Ahmed Raza"
                      },
                      "phone": {
                        "type": "string",
                        "example": "03001234567"
                      },
                      "addressLine1": {
                        "type": "string",
                        "example": "House 12, Block B"
                      },
                      "addressLine2": {
                        "type": "string",
                        "example": "Near City Hospital"
                      },
                      "city": {
                        "type": "string",
                        "example": "Karachi"
                      },
                      "state": {
                        "type": "string",
                        "example": "Sindh"
                      },
                      "postalCode": {
                        "type": "string",
                        "example": "75500"
                      },
                      "country": {
                        "type": "string",
                        "example": "Pakistan"
                      }
                    }
                  },
                  "couponCode": {
                    "type": "string",
                    "example": "SAVE20"
                  },
                  "paymentMethod": {
                    "type": "string",
                    "enum": [
                      "stripe",
                      "cod"
                    ],
                    "example": "stripe"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Order placed successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "clientSecret": {
                      "type": "string",
                      "description": "Stripe client secret (only for stripe payments)",
                      "example": "pi_3OqX2t_secret_xyz"
                    }
                  }
                }
              }
            }
          },
          "400": {
            "description": "Invalid product, insufficient stock, or coupon error"
          },
          "422": {
            "description": "Validation error"
          }
        }
      }
    },
